<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background principal -->
  <rect width="1920" height="1080" fill="#f5f5f5"/>

  <!-- Faixa superior para título e filtros -->
  <rect x="0" y="0" width="1920" height="220" fill="#ffffff"/>
  <line x1="0" y1="220" x2="1920" y2="220" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Container para as tabelas -->
  <g id="tables-container">
    <!-- Tabela 1 (esquerda) - menor -->
    <rect x="30" y="250" width="800" height="800" fill="#ffffff" rx="8"/>

    <!-- Tabela 2 (direita) - maior -->
    <rect x="850" y="250" width="1040" height="800" fill="#ffffff" rx="8"/>
  </g>

  <!-- Sombras sutis nas tabelas -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <use href="#tables-container" filter="url(#shadow)"/>
</svg>